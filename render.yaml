services:
  - type: web
    name: anchor
    runtime: python
    plan: free
    region: frankfurt
    rootDir: anchor
    buildCommand: pip install --upgrade pip && pip install .
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/carer/notifications
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: GLM_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
