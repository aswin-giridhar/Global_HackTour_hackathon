<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anchor — Family</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    html, body { overflow: auto; }
    body { background: var(--cream); }

    .family-page {
      min-height: 100vh;
      padding: 56px 32px 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .family-title {
      font-family: var(--font-display);
      font-size: clamp(44px, 5.5vw, 60px);
      font-weight: 500;
      color: var(--brown-deep);
      margin-bottom: 6px;
      text-align: center;
    }

    .family-subtitle {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 24px;
      color: var(--brown-soft);
      margin-bottom: 12px;
      text-align: center;
    }

    .family-next {
      margin-bottom: 40px;
      padding: 14px 24px;
      background: var(--warm-white);
      border: 1px solid var(--sand);
      border-radius: 100px;
      font-family: var(--font-display);
      font-size: 20px;
      color: var(--brown-warm);
      box-shadow: 0 2px 10px var(--shadow-warm);
    }
    .family-next strong { color: var(--brown-deep); font-weight: 500; }

    .family-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 340px));
      gap: 32px;
      max-width: 1200px;
      width: 100%;
      justify-content: center;
    }

    .family-card {
      background: var(--warm-white);
      border: 1px solid var(--sand);
      border-radius: 28px;
      padding: 36px 28px 28px;
      text-align: center;
      box-shadow: 0 6px 24px var(--shadow-warm);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .family-card.primary {
      border-color: var(--amber);
      box-shadow: 0 8px 30px rgba(212, 165, 116, 0.2);
    }

    .family-card.primary::before {
      content: 'Primary carer';
      position: absolute;
      top: 18px;
      right: -40px;
      transform: rotate(34deg);
      background: var(--amber);
      color: white;
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 40px;
    }

    .family-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(212, 165, 116, 0.28);
    }

    /* Portrait — real photo preferred, soft SVG illustration fallback */
    .portrait {
      width: 160px;
      height: 160px;
      margin: 0 auto 24px;
      position: relative;
      border-radius: 50%;
      overflow: hidden;
      background: var(--stone);
    }

    .portrait svg { width: 100%; height: 100%; display: block; }
    .portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .voice-btn {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 100px;
      border: 1px solid var(--amber);
      background: var(--warm-white);
      color: var(--brown-deep);
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 44px;
    }
    .voice-btn:hover {
      background: var(--amber);
      color: white;
    }
    .voice-btn.playing {
      background: var(--sage);
      border-color: var(--sage);
      color: white;
    }

    .family-name {
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 500;
      color: var(--brown-deep);
      margin-bottom: 2px;
      line-height: 1.1;
    }

    .family-relation {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 22px;
      color: var(--brown-soft);
      margin-bottom: 18px;
    }

    .family-meta-list {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--brown-warm);
      line-height: 1.55;
      margin-bottom: 22px;
      min-height: 1em;
    }

    .family-meta-list .row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid rgba(212, 197, 176, 0.3);
    }
    .family-meta-list .row:last-child { border-bottom: none; }
    .family-meta-list .row span:first-child {
      color: var(--brown-soft);
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.07em;
      font-weight: 600;
    }
    .family-meta-list .row span:last-child {
      color: var(--brown-deep);
      font-weight: 500;
      text-align: right;
    }

    .family-meta-list .row .countdown {
      color: var(--sage);
      font-weight: 600;
    }

    .call-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: auto;
      padding: 16px 32px;
      border-radius: 100px;
      background: var(--sage);
      color: white;
      text-decoration: none;
      font-family: var(--font-ui);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: 0 5px 18px rgba(142, 168, 118, 0.4);
      transition: all 0.25s ease;
      min-height: 58px;
    }

    .call-btn:hover {
      background: var(--sage-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(142, 168, 118, 0.5);
    }

    .call-btn .phone-icon { font-size: 22px; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-ui);
      font-size: 14px;
      color: var(--brown-warm);
      text-decoration: none;
      margin-top: 48px;
      padding: 12px 24px;
      border-radius: 100px;
      border: 1px solid var(--sand);
      background: var(--warm-white);
      transition: all 0.25s ease;
    }
    .back-link:hover {
      border-color: var(--amber);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--shadow-warm);
    }
  </style>
</head>
<body>
  <div class="family-page">
    <h1 class="family-title">Your family</h1>
    <p class="family-subtitle">The people who love you most</p>
    <div class="family-next" id="family-next" hidden></div>
    <div class="family-grid" id="family-grid"></div>
    <a href="/" class="back-link">&larr; Back to Anchor</a>
  </div>

  <script>
    const PROTOTYPE_NUMBERS = {
      Priya: '+441612345678',
      David: '+441132987654',
      James: '+441612345679',
    };

    // Warm illustrated portraits — abstract, not photographic
    const PORTRAIT_PALETTES = {
      Priya: { bg: '#EAD7BF', skin: '#E5C8A5', hair: '#5C4033', blouse: '#A8C494' },
      David: { bg: '#E3D4BA', skin: '#E0BE99', hair: '#3D2B1F', blouse: '#8EA876' },
      James: { bg: '#F4E4CC', skin: '#F2D4B4', hair: '#8B5A2B', blouse: '#D4A574' },
    };

    function portraitSvg(name) {
      const p = PORTRAIT_PALETTES[name] || {bg:'#E8DDD0', skin:'#E5C8A5', hair:'#5C4033', blouse:'#A8C494'};
      return `
        <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- warm background circle -->
          <circle cx="80" cy="80" r="76" fill="${p.bg}"/>
          <circle cx="80" cy="80" r="76" fill="none" stroke="rgba(61,43,31,0.08)" stroke-width="1"/>
          <!-- soft shoulders -->
          <path d="M 16 160 Q 80 110 144 160 Z" fill="${p.blouse}"/>
          <!-- neck -->
          <rect x="68" y="96" width="24" height="20" fill="${p.skin}" rx="6"/>
          <!-- head -->
          <ellipse cx="80" cy="72" rx="32" ry="36" fill="${p.skin}"/>
          <!-- hair -->
          <path d="M 48 60 Q 48 30 80 28 Q 112 30 112 60 Q 112 52 110 50 Q 96 44 80 44 Q 64 44 50 50 Q 48 52 48 60 Z" fill="${p.hair}"/>
          <!-- soft cheek blush -->
          <circle cx="64" cy="82" r="5" fill="rgba(196,122,84,0.25)"/>
          <circle cx="96" cy="82" r="5" fill="rgba(196,122,84,0.25)"/>
          <!-- eyes (gentle closed-ish arcs) -->
          <path d="M 62 74 Q 66 72 70 74" stroke="${p.hair}" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M 90 74 Q 94 72 98 74" stroke="${p.hair}" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- smile -->
          <path d="M 70 88 Q 80 94 90 88" stroke="rgba(61,43,31,0.6)" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
      `;
    }

    // Parse "Thursdays 3pm" to next occurrence, return a warm countdown string
    const DAYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    function nextVisitFromPattern(pattern) {
      if (!pattern) return null;
      const m = pattern.toLowerCase().match(/(sun|mon|tues|wednes|thurs|fri|satur)days?/);
      if (!m) return null;
      const dayName = m[1].startsWith('tues')   ? 'tuesday'
                   : m[1].startsWith('wednes') ? 'wednesday'
                   : m[1].startsWith('thurs')  ? 'thursday'
                   : m[1].startsWith('satur')  ? 'saturday'
                   : m[1] + 'day';
      const target = DAYS.indexOf(dayName);
      const today = new Date();
      const now = today.getDay();
      let days = (target - now + 7) % 7;
      if (days === 0) days = 7;
      if (days === 1) return 'Tomorrow';
      if (days === 0) return 'Today';
      return `In ${days} days`;
    }

    async function loadFamily() {
      const [res, photosRes, voicesRes] = await Promise.all([
        fetch('/api/family'),
        fetch('/api/family/photo').catch(() => null),
        fetch('/api/family/voice').catch(() => null),
      ]);
      const data = await res.json();
      const photos = photosRes && photosRes.ok ? (await photosRes.json()).photos : {};
      const voices = voicesRes && voicesRes.ok ? (await voicesRes.json()).voices : {};
      const grid = document.getElementById('family-grid');

      // Sort: primary carer first, then daughters/sons, then grandchildren
      const order = { 'primary carer': 0, daughter: 1, son: 1, grandson: 2, granddaughter: 2 };
      const sorted = data.family.slice().sort((a, b) =>
        (order[a.role] ?? order[a.relation] ?? 9) - (order[b.role] ?? order[b.relation] ?? 9)
      );

      // Who's coming next? pick the soonest visit
      let soonest = null, soonestDays = 999;
      sorted.forEach(m => {
        const visit = nextVisitFromPattern(m.visits);
        if (visit) {
          const dayMatch = visit.match(/In (\d+) days?/);
          const d = dayMatch ? parseInt(dayMatch[1]) : (visit === 'Tomorrow' ? 1 : 0);
          if (d < soonestDays) { soonestDays = d; soonest = { member: m, when: visit }; }
        }
      });
      const next = document.getElementById('family-next');
      if (soonest) {
        next.innerHTML = `<strong>${soonest.member.name}</strong> is visiting <strong>${soonest.when.toLowerCase()}</strong>`;
        next.hidden = false;
      }

      grid.innerHTML = sorted.map(member => {
        const isPrimary = (member.role || '').toLowerCase().includes('primary');
        const tel = PROTOTYPE_NUMBERS[member.name] || '';
        const nextVisit = nextVisitFromPattern(member.visits);

        const rows = [];
        if (member.location)  rows.push(['Lives', member.location]);
        if (member.visits)    rows.push(['Visits', `<span class="countdown">${nextVisit || member.visits}</span>`]);
        if (member.notes)     rows.push(['Loves', member.notes.split('.')[0] + '.']);

        const metaHtml = rows.map(([k,v]) =>
          `<div class="row"><span>${k}</span><span>${v}</span></div>`
        ).join('');

        const callBtn = tel
          ? `<a class="call-btn" href="tel:${tel}" aria-label="Call ${member.name}"><span class="phone-icon">📞</span> Call ${member.name}</a>`
          : '';

        const voiceUrl = voices[member.name];
        const voiceBtn = voiceUrl
          ? `<button class="voice-btn" data-voice="${voiceUrl}" data-name="${member.name}">🎙 Hear ${member.name}'s message</button>`
          : '';

        // Prefer uploaded photo, then the bundled watercolour illustration,
        // then the abstract SVG. Chained onerror so missing files degrade cleanly.
        const watercolour = `/static/assets/family/${member.name.toLowerCase()}.jpg`;
        const escapedSvg = portraitSvg(member.name).replace(/"/g, '&quot;').replace(/\n/g, ' ');
        const portraitContent = photos[member.name]
          ? `<img src="${photos[member.name]}" alt="${member.name}" onerror="this.onerror=null; this.src='${watercolour}'; this.addEventListener('error', () => { this.outerHTML = &quot;${escapedSvg}&quot;; });"/>`
          : `<img src="${watercolour}" alt="${member.name}" onerror="this.outerHTML = &quot;${escapedSvg}&quot;;"/>`;

        return `
          <div class="family-card ${isPrimary ? 'primary' : ''}">
            <div class="portrait">${portraitContent}</div>
            <div class="family-name">${member.name}</div>
            <div class="family-relation">${member.relation}</div>
            <div class="family-meta-list">${metaHtml}</div>
            ${callBtn}
            ${voiceBtn}
          </div>
        `;
      }).join('');

      // Wire voice playback
      const audio = new Audio();
      let playingBtn = null;
      grid.querySelectorAll('.voice-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (playingBtn === btn) {
            audio.pause();
            btn.classList.remove('playing');
            btn.textContent = `🎙 Hear ${btn.dataset.name}'s message`;
            playingBtn = null;
            return;
          }
          if (playingBtn) {
            playingBtn.classList.remove('playing');
            playingBtn.textContent = `🎙 Hear ${playingBtn.dataset.name}'s message`;
          }
          audio.src = btn.dataset.voice;
          audio.play().catch(err => console.error('Playback blocked:', err));
          btn.classList.add('playing');
          btn.textContent = '⏸ Pause';
          playingBtn = btn;
        });
      });
      audio.addEventListener('ended', () => {
        if (playingBtn) {
          playingBtn.classList.remove('playing');
          playingBtn.textContent = `🎙 Hear ${playingBtn.dataset.name}'s message`;
          playingBtn = null;
        }
      });
    }

    loadFamily();
  </script>
</body>
</html>
