<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anchor — Priya's view</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─── Carer view — warm, clean, professional ─── */
    :root {
      --cream:       #F5EDE0;
      --warm-white:  #FAF6F0;
      --stone:       #E8DDD0;
      --sand:        #D4C5B0;
      --amber:       #D4A574;
      --terracotta:  #C47A54;
      --sage:        #8EA876;
      --sage-light:  #A8C494;
      --brown-deep:  #3D2B1F;
      --brown-warm:  #5C4033;
      --brown-soft:  #7A6352;
      --font-ui:     'DM Sans', -apple-system, system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--warm-white);
      color: var(--brown-deep);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--stone);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sage);
      animation: status-pulse 3s ease-in-out infinite;
    }

    @keyframes status-pulse {
      0%, 100% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(142, 168, 118, 0.3); }
      50%      { opacity: 1;   box-shadow: 0 0 0 4px rgba(142, 168, 118, 0); }
    }

    .status-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--sage);
      letter-spacing: 0.02em;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--brown-warm);
    }

    /* ─── Empty state ─── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 12px;
      border: 1px solid var(--stone);
    }

    .empty-text {
      font-size: 14px;
      color: var(--brown-soft);
      line-height: 1.5;
    }

    .empty-sub {
      font-size: 12px;
      color: var(--sand);
      margin-top: 4px;
    }

    /* ─── Notification cards ─── */
    #notifications {
      padding: 12px 16px;
    }

    .notif {
      background: var(--warm-white);
      border: 1px solid var(--stone);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      animation: notif-slide 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      position: relative;
      overflow: hidden;
    }

    .notif::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--sage);
      border-radius: 0 2px 2px 0;
    }

    .notif.high::before {
      background: var(--terracotta);
    }

    .notif-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .notif-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 8px;
      border-radius: 100px;
      background: rgba(142, 168, 118, 0.12);
      color: var(--sage);
    }

    .notif.high .notif-badge {
      background: rgba(196, 122, 84, 0.12);
      color: var(--terracotta);
    }

    .notif-time {
      font-size: 11px;
      color: var(--sand);
      font-weight: 500;
    }

    .notif-msg {
      font-size: 14px;
      font-weight: 500;
      color: var(--brown-deep);
      line-height: 1.4;
    }

    .notif-context {
      font-size: 12px;
      color: var(--brown-soft);
      margin-top: 4px;
      line-height: 1.4;
    }

    .notif-context strong {
      font-weight: 600;
      color: var(--brown-warm);
    }

    @keyframes notif-slide {
      0% {
        opacity: 0;
        transform: translateY(-8px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── Connection status ─── */
    .reconnecting .status-dot {
      background: var(--terracotta);
      animation: status-pulse 1s ease-in-out infinite;
    }
    .reconnecting .status-text {
      color: var(--terracotta);
    }

    /* ─── Medication panel ─── */
    .med-panel {
      margin: 12px 16px 0;
      padding: 14px 16px;
      background: var(--cream);
      border: 1px solid var(--stone);
      border-radius: 12px;
    }

    .med-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--brown-soft);
      margin-bottom: 10px;
    }

    .med-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 0;
    }

    .med-row + .med-row {
      border-top: 1px solid rgba(212, 197, 176, 0.4);
    }

    .med-label {
      font-size: 13px;
      color: var(--brown-warm);
      font-weight: 500;
    }

    .med-sub {
      font-size: 11px;
      color: var(--brown-soft);
      margin-top: 2px;
    }

    .med-btn {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--amber);
      background: var(--warm-white);
      color: var(--brown-deep);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .med-btn:hover {
      background: var(--amber);
      color: white;
    }

    .med-btn.done {
      background: rgba(142, 168, 118, 0.14);
      color: var(--sage);
      border-color: rgba(142, 168, 118, 0.4);
      cursor: default;
    }

    /* Carer nav strip */
    .carer-nav {
      display: flex;
      gap: 8px;
      padding: 10px 16px 0;
      flex-wrap: wrap;
    }
    .carer-nav a, .carer-nav button {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--stone);
      background: var(--warm-white);
      color: var(--brown-warm);
      text-decoration: none;
      cursor: pointer;
    }
    .carer-nav a:hover, .carer-nav button:hover { border-color: var(--amber); }

    /* Schedule editor */
    .schedule-panel {
      margin: 12px 16px 0;
      padding: 14px 16px;
      background: var(--cream);
      border: 1px solid var(--stone);
      border-radius: 12px;
      display: none;
    }
    .schedule-panel.open { display: block; }
    .schedule-row {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 10px;
      align-items: center;
      padding: 6px 0;
    }
    .schedule-row + .schedule-row {
      border-top: 1px solid rgba(212,197,176,0.4);
    }
    .schedule-row label {
      font-size: 13px;
      color: var(--brown-warm);
      font-weight: 500;
    }
    .schedule-row input {
      font-family: var(--font-ui);
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--sand);
      background: white;
    }
    .schedule-save {
      margin-top: 10px;
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 100px;
      border: none;
      background: var(--amber);
      color: white;
      cursor: pointer;
    }
    .schedule-save:hover { background: var(--terracotta); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="status-dot"></div>
      <span class="status-text">Margaret is doing fine</span>
    </div>
    <span class="header-title">Priya's view</span>
  </div>

  <div class="carer-nav">
    <a href="/logs">Health log</a>
    <a href="/safety">Safety &amp; location</a>
    <button id="toggle-schedule">Edit schedule</button>
  </div>

  <div class="schedule-panel" id="schedule-panel">
    <div class="med-title">Edit Margaret's schedule</div>
    <div class="schedule-row"><label>Morning medicine time</label><input type="time" id="sched-med-morning"></div>
    <div class="schedule-row"><label>Evening medicine time</label><input type="time" id="sched-med-evening"></div>
    <div class="schedule-row"><label>Morning tea</label><input type="time" id="sched-tea"></div>
    <div class="schedule-row"><label>Lunch</label><input type="time" id="sched-lunch"></div>
    <div class="schedule-row"><label>Dinner</label><input type="time" id="sched-dinner"></div>
    <button class="schedule-save" id="schedule-save">Save schedule</button>
    <span id="schedule-msg" style="margin-left:10px;font-size:11px;color:var(--sage);"></span>
  </div>

  <div class="med-panel" id="med-panel">
    <div class="med-title">Today's medication</div>
    <div class="med-row">
      <div>
        <div class="med-label" id="med-morning-label">Morning dose</div>
        <div class="med-sub" id="med-morning-sub">—</div>
      </div>
      <button class="med-btn" id="med-morning-btn" data-slot="morning">Mark as taken</button>
    </div>
    <div class="med-row">
      <div>
        <div class="med-label" id="med-evening-label">Evening dose</div>
        <div class="med-sub" id="med-evening-sub">—</div>
      </div>
      <button class="med-btn" id="med-evening-btn" data-slot="evening">Mark as taken</button>
    </div>
  </div>

  <div id="notifications"></div>

  <div id="empty-state">
    <div class="empty-icon">🏠</div>
    <div class="empty-text">No notifications yet.</div>
    <div class="empty-sub">Margaret is resting quietly.</div>
  </div>

  <audio id="chime" src="/static/assets/chime.wav"></audio>

  <script>
    let lastCount = 0;
    let reconnectAttempts = 0;

    async function poll() {
      try {
        const res = await fetch('/api/carer/notifications');
        if (!res.ok) throw new Error('Network error');
        const notifs = await res.json();

        // Reset reconnect on success
        reconnectAttempts = 0;
        document.body.classList.remove('reconnecting');

        // Update status text
        const statusText = document.querySelector('.status-text');
        if (notifs.length > 0) {
          const latest = notifs[notifs.length - 1];
          const isHigh = latest.urgency === 'high';
          statusText.textContent = isHigh ? 'Margaret needs attention' : 'Gentle check-in suggested';
          statusText.style.color = isHigh ? 'var(--terracotta)' : 'var(--amber)';
        } else {
          statusText.textContent = 'Margaret is doing fine';
          statusText.style.color = '';
        }

        if (notifs.length > lastCount) {
          const chime = document.getElementById('chime');
          chime.play().catch(() => {});
          lastCount = notifs.length;
        }
        render(notifs);
      } catch (err) {
        reconnectAttempts++;
        if (reconnectAttempts > 3) {
          document.body.classList.add('reconnecting');
          document.querySelector('.status-text').textContent = 'Reconnecting...';
        }
        console.error('[Carer] Poll error:', err);
      }
    }

    function render(notifs) {
      const container = document.getElementById('notifications');
      const emptyState = document.getElementById('empty-state');

      if (notifs.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'flex';
        return;
      }

      emptyState.style.display = 'none';
      container.innerHTML = notifs.slice().reverse().map(n => `
        <div class="notif ${n.urgency || 'gentle'}">
          <div class="notif-header">
            <span class="notif-badge">${(n.urgency || 'gentle') === 'high' ? '⚠ Urgent' : '💡 Gentle'}</span>
            <span class="notif-time">${new Date(n.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
          </div>
          <div class="notif-msg">Margaret said: "${n.patient_said}"</div>
          <div class="notif-context"><strong>Anchor said:</strong> ${n.anchor_replied}</div>
        </div>
      `).join('');
    }

    // ─── Medication panel ───
    async function refreshMedStatus() {
      try {
        const res = await fetch('/api/medication/status');
        const s = await res.json();
        const m = s.morning_schedule || {};
        const e = s.evening_schedule || {};
        document.getElementById('med-morning-sub').textContent =
          `${m.drug || 'Dose'} ${m.dose || ''} at ${m.time || ''}`.trim();
        document.getElementById('med-evening-sub').textContent =
          `${e.drug || 'Dose'} ${e.dose || ''} at ${e.time || ''}`.trim();
        updateMedBtn('morning', s.morning_taken);
        updateMedBtn('evening', s.evening_taken);
      } catch (err) {
        console.warn('[Carer] Medication status unavailable:', err);
      }
    }

    function updateMedBtn(slot, taken) {
      const btn = document.getElementById(`med-${slot}-btn`);
      if (!btn) return;
      if (taken) {
        btn.textContent = '✓ Taken today';
        btn.classList.add('done');
        btn.disabled = true;
      } else {
        btn.textContent = 'Mark as taken';
        btn.classList.remove('done');
        btn.disabled = false;
      }
    }

    document.querySelectorAll('.med-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const slot = btn.dataset.slot;
        btn.disabled = true;
        btn.textContent = '…';
        try {
          const res = await fetch('/api/medication/taken', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ slot, marked_by: 'carer' }),
          });
          if (!res.ok) throw new Error('Network error');
          updateMedBtn(slot, true);
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Try again';
          console.error('[Carer] Med mark error:', err);
        }
      });
    });

    refreshMedStatus();
    setInterval(refreshMedStatus, 10000);

    // ─── Schedule editor ───
    const schedPanel = document.getElementById('schedule-panel');
    document.getElementById('toggle-schedule').addEventListener('click', async () => {
      schedPanel.classList.toggle('open');
      if (schedPanel.classList.contains('open')) {
        try {
          const res = await fetch('/api/schedule');
          const s = (await res.json()).routine || {};
          document.getElementById('sched-med-morning').value = (s.medication_morning && s.medication_morning.time) || '';
          document.getElementById('sched-med-evening').value = (s.medication_evening && s.medication_evening.time) || '';
          document.getElementById('sched-tea').value    = s.tea    || '';
          document.getElementById('sched-lunch').value  = s.lunch  || '';
          document.getElementById('sched-dinner').value = s.dinner || '';
        } catch (e) { console.warn('schedule load failed', e); }
      }
    });

    document.getElementById('schedule-save').addEventListener('click', async () => {
      const btn = document.getElementById('schedule-save');
      const msg = document.getElementById('schedule-msg');
      btn.disabled = true; msg.textContent = '';
      const body = {
        medication_morning_time: document.getElementById('sched-med-morning').value || null,
        medication_evening_time: document.getElementById('sched-med-evening').value || null,
        tea:    document.getElementById('sched-tea').value    || null,
        lunch:  document.getElementById('sched-lunch').value  || null,
        dinner: document.getElementById('sched-dinner').value || null,
      };
      try {
        const res = await fetch('/api/schedule/update', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error();
        msg.textContent = '✓ Saved';
        refreshMedStatus();
      } catch {
        msg.textContent = 'Save failed';
      } finally {
        btn.disabled = false;
      }
    });

    setInterval(poll, 2000);
    poll();
  </script>
</body>
</html>
